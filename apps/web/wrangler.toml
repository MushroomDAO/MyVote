name = "myvote"
compatibility_date = "2024-01-01"

# Pages Functions build output
pages_build_output_dir = "dist"

# KV namespace binding for tenant configs
# After creating: wrangler kv namespace create TENANTS_KV
# Replace the id below with the real namespace ID
[[kv_namespaces]]
binding = "TENANTS_KV"
id = "b48caba076cb477698121c95f9e69d9e"
preview_id = "34c1c5f2e50243d1992af2f547151140"

# Environment variables (non-secret)
# Secrets (CF_API_TOKEN etc.) must be set via:
#   wrangler pages secret put CF_API_TOKEN --project-name myvote
[vars]
CF_ROOT_DOMAIN = "forest.mushroom.cv"

# Local dev:
#   pnpm run build
#   wrangler pages dev dist/
#
# The middleware in functions/_middleware.ts and API routes in functions/api/ run automatically.
# To test tenant routing locally, add to /etc/hosts:
#   127.0.0.1  bread.forest.mushroom.cv
# Then access http://bread.forest.mushroom.cv:8788
