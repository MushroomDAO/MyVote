name = "myvote"
compatibility_date = "2024-01-01"

# Local development:
#   pnpm run build
#   wrangler pages dev dist/
#
# The middleware in functions/_middleware.ts runs automatically.
# To test a specific tenant locally, add an entry to /etc/hosts:
#   127.0.0.1  aastar.local
# Then access http://aastar.local:8788
#
# Tenant config is read from tenants.json at build time.
# For dynamic tenant management without redeployment, migrate to Cloudflare KV:
#   [[kv_namespaces]]
#   binding = "TENANTS_KV"
#   id = "your-kv-namespace-id"
